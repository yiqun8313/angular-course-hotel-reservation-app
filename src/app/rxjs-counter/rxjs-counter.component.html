<div class="counter-page">
  <h3>RxJS Counter</h3>

  <p class="counter-value">{{ count$ | async }}</p>

  <div class="counter-actions">
    <button class="btn btn-primary" type="button" (click)="increment()">+1</button>
    <button class="btn btn-outline-secondary" type="button" (click)="decrement()">-1</button>
    <button class="btn btn-danger" type="button" (click)="reset()">Reset</button>
  </div>
</div>
