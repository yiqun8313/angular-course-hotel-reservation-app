<div class="star-wars-page">
  <h3>Star Wars Films Search</h3>

  <div class="search-form">
    <input
      class="form-control"
      type="text"
      [(ngModel)]="characterName"
      placeholder="Luke Skywalker">

    <button class="btn btn-primary" type="button" (click)="searchFilms()" [disabled]="isLoading">
      Search
    </button>
  </div>

  <p class="text-muted" *ngIf="isLoading">Loading films...</p>

  <p class="text-danger" *ngIf="errorMessage">{{ errorMessage }}</p>

  <table class="table table-striped mt-4" *ngIf="films.length > 0">
    <thead>
      <tr>
        <th>Title</th>
        <th>Year</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let film of films">
        <td>{{ film.title }}</td>
        <td>{{ film.year }}</td>
      </tr>
    </tbody>
  </table>
</div>
